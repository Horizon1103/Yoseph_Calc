<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Calculator - Federated Identity</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .hidden { display: none; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #4285F4; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #result { font-weight: bold; font-size: 1.2rem; color: #333; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section">
            <h2>Assignment: FIM</h2>
            <p>Please sign in to use the calculator.</p>
            <div id="buttonDiv"></div>
        </div>

        <div id="calc-section" class="hidden">
            <h2 id="welcome-msg">Welcome!</h2>
            <input type="number" id="val1" placeholder="First Number">
            <input type="number" id="val2" placeholder="Second Number">
            <button onclick="calculate()">Add Numbers</button>
            <div id="result"></div>
            <br>
            <a href="#" onclick="logout()" style="font-size: 0.8rem; color: #666;">Sign Out</a>
        </div>
    </div>

    <script>
        // Use your Client ID from the uploaded JSON
        const CLIENT_ID = "822772930738-os6g042t8jj1t3aek0o8j7qnave572vc.apps.googleusercontent.com";

        function handleCredentialResponse(response) {
            // Decode the Google JWT to get user info
            const responsePayload = parseJwt(response.credential);
            
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('calc-section').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Hello, ${responsePayload.given_name}!`;
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large" } 
            );
        }

        function calculate() {
            const v1 = parseFloat(document.getElementById('val1').value) || 0;
            const v2 = parseFloat(document.getElementById('val2').value) || 0;
            document.getElementById('result').innerText = `Result: ${v1 + v2}`;
        }

        function logout() {
            location.reload(); // Simple way to reset state for an assignment
        }

        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
